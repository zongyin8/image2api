server {
    server_name tu.go2api.cc;
    client_max_body_size 100m;
    proxy_read_timeout 600s;
    proxy_send_timeout 600s;

    location /new/ {
        root /opt/image2api-g2a;
        try_files $uri /new/index.html;
    }

    location / {
        root /opt/image2api-g2a/web-user;
        try_files $uri $uri/ /index.html;
    }

    location /admin/api/ {
        proxy_pass http://127.0.0.1:2000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location /v1/ {
        proxy_pass http://127.0.0.1:2000;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location /images/ {
        proxy_pass http://127.0.0.1:2000;
        proxy_set_header Host $host;
    }
    location = /health { proxy_pass http://127.0.0.1:2000; }

    location = /healthz {
        allow 156.238.251.136;
        allow 127.0.0.1;
        deny all;
        proxy_pass http://127.0.0.1:18099;
        proxy_set_header Host $host;
    }
    location /api/ {
        allow 156.238.251.136;
        allow 127.0.0.1;
        deny all;
        proxy_pass http://127.0.0.1:18099;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_read_timeout 120s;
    }

    location = /_prov_auth {
        internal;
        proxy_pass http://127.0.0.1:2000/admin/api/auth/me;
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
        proxy_set_header Host $host;
    }
    location /register/api/ {
        auth_request /_prov_auth;
        proxy_pass http://127.0.0.1:18002/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Authorization "Bearer REPLACE_WITH_PROVISION_ADMIN_KEY";
        proxy_read_timeout 120s;
    }

    listen 443 ssl;
    ssl_certificate /etc/letsencrypt/live/tu.go2api.cc/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/tu.go2api.cc/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

server {
    listen 80;
    server_name tu.go2api.cc;
    return 301 https://$host$request_uri;
}
