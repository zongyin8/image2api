services:
  provisioner:
    build:
      context: ..
      dockerfile: provisioner/Dockerfile
    image: image2api-provisioner:latest
    container_name: image2api-provisioner
    network_mode: host
    env_file:
      - ../provisioner.env
    environment:
      IMAGE2API_BASE: http://127.0.0.1:2000
      PROVISION_DATA_DIR: /data
    volumes:
      - /var/lib/image2api-provisioner:/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:18002/healthz', timeout=3)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: unless-stopped
